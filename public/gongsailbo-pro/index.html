<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>공사일보프로</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>공사일보프로</h1>
      <p id="projectLine">한국정보통신공사협회 제주특별자치도 회관 신축공사</p>
    </div>
    <div class="top-actions">
      <button id="saveBtn" class="primary" type="button">저장</button>
      <button id="previewBtn" type="button">미리보기</button>
      <button id="printBtn" type="button">인쇄</button>
      <button id="exportBtn" type="button">엑셀</button>
      <button id="shareBtn" type="button">공유문</button>
    </div>
  </header>

  <main class="shell">
    <aside class="sidebar">
      <section class="panel">
        <div class="field">
          <label for="reportDate">작성일</label>
          <input id="reportDate" type="date">
        </div>
        <button id="newReportBtn" class="wide" type="button">해당 날짜 열기</button>
      </section>
      <section class="panel grow">
        <div class="section-head">
          <h2>작성 목록</h2>
          <span id="reportCount">0건</span>
        </div>
        <div id="dateList" class="date-list"></div>
      </section>
    </aside>

    <section class="workspace">
      <section class="sheet">
        <div class="sheet-title">
          <h2>공사일보</h2>
          <span id="activeDateText"></span>
        </div>

        <div class="form-grid">
          <div class="field span-2">
            <label for="projectName">공사명</label>
            <input id="projectName" type="text">
          </div>
          <div class="field">
            <label for="weather">날씨</label>
            <select id="weather">
              <option>맑음</option>
              <option>흐림</option>
              <option>비</option>
              <option>눈</option>
              <option>강풍</option>
              <option>폭염</option>
            </select>
          </div>
          <div class="field">
            <label>최고/최저온도</label>
            <div class="temp-inputs">
              <input id="tempHigh" type="number" step="0.1" placeholder="최고 ℃">
              <input id="tempLow" type="number" step="0.1" placeholder="최저 ℃">
            </div>
          </div>
          <div class="field">
            <label for="progressRate">주간공정율</label>
            <input id="progressRate" type="number" min="0" max="100" step="0.1" placeholder="%">
          </div>
          <div class="field span-2">
            <label for="period">공사기간</label>
            <input id="period" type="text">
          </div>
          <div class="field span-2">
            <label for="siteMemo">특이사항</label>
            <input id="siteMemo" type="text" placeholder="우천 작업중지, 검측, 안전조치 등">
          </div>
        </div>

        <nav class="tabs" aria-label="입력 구분">
          <button class="tab active" data-tab="labor" type="button">인원</button>
          <button class="tab" data-tab="equipment" type="button">장비</button>
          <button class="tab" data-tab="material" type="button">자재</button>
          <button class="tab" data-tab="plan" type="button">작업내용</button>
        </nav>

        <section class="tab-panel active" id="laborPanel">
          <div class="section-head">
            <h3>금일 작업 공정</h3>
            <button class="small" data-add="labor" type="button">행 추가</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>업체명</th>
                  <th>공종</th>
                  <th>전일</th>
                  <th>금일</th>
                  <th>누계</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="laborRows"></tbody>
            </table>
          </div>
        </section>

        <section class="tab-panel" id="equipmentPanel">
          <div class="section-head">
            <h3>장비 투입 현황</h3>
            <button class="small" data-add="equipment" type="button">행 추가</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>장비명</th>
                  <th>규격</th>
                  <th>전일</th>
                  <th>금일</th>
                  <th>누계</th>
                  <th>비고</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="equipmentRows"></tbody>
            </table>
          </div>
        </section>

        <section class="tab-panel" id="materialPanel">
          <div class="section-head">
            <h3>자재 투입 현황</h3>
            <button class="small" data-add="material" type="button">행 추가</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>자재명</th>
                  <th>규격</th>
                  <th>단위</th>
                  <th>전일</th>
                  <th>금일</th>
                  <th>누계</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="materialRows"></tbody>
            </table>
          </div>
        </section>

        <section class="tab-panel" id="planPanel">
          <div class="field">
            <label for="todayWork">금일 작업내용</label>
            <textarea id="todayWork" rows="8"></textarea>
          </div>
          <div class="field">
            <label for="tomorrowWork">명일 작업내용</label>
            <textarea id="tomorrowWork" rows="8"></textarea>
          </div>
          <div class="share-box">
            <div class="section-head">
              <h3>카톡 공유용 문안</h3>
              <button class="small" id="copyShareBtn" type="button">복사</button>
            </div>
            <textarea id="shareText" rows="10" readonly></textarea>
          </div>
        </section>
      </section>

      <section class="preview-panel" id="previewPanel">
        <div class="section-head">
          <h2>출력 미리보기</h2>
          <div class="preview-meta">
            <span>A4 세로 / 엑셀 출력 양식</span>
            <div class="zoom-controls">
              <button id="zoomOutBtn" class="small" type="button" aria-label="축소">−</button>
              <span id="zoomLevel">100%</span>
              <button id="zoomInBtn" class="small" type="button" aria-label="확대">+</button>
              <button id="zoomResetBtn" class="small" type="button">원래 크기</button>
            </div>
          </div>
        </div>
        <div class="preview-scroll">
          <div id="previewPaper" class="report-paper"></div>
        </div>
      </section>
    </section>
  </main>

  <div id="toast" role="status" aria-live="polite"></div>
</body>
</html>
